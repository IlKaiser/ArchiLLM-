spring.application.name=gasstation-test
# Run as a non-web application (command-line runner only)
spring.main.web-application-type=none

# Backend URL to test against
backend.url=http://localhost:8080/api

# Report output directory (absolute or relative to working directory)
report.output.dir=run/gasstation/test

# Logging
logging.level.com.gasstation.test=INFO
logging.level.org.springframework=WARN
