

services:
  # ── Laminar telemetry stack ────────────────────────────────────────────
  lmnr-postgres:
    image: postgres:16
    pull_policy: always
    ports:
      - "5433:5432"
    volumes:
      - lmnr-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_passwordabc
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  lmnr-clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: lmnr-clickhouse
    pull_policy: always
    volumes:
      - lmnr-clickhouse-data:/var/lib/clickhouse/
      - lmnr-clickhouse-logs:/var/log/clickhouse-server/
      - ./clickhouse-profiles-config.xml:/etc/clickhouse-server/users.d/lmnr.xml
    environment:
      CLICKHOUSE_USER: ch_user
      CLICKHOUSE_PASSWORD: ch_passwd
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  lmnr-quickwit:
    image: quickwit/quickwit:v0.8.2
    pull_policy: always
    ports:
      - "7280:7280"
      - "7281:7281"
    environment:
      QW_DATA_DIR: /quickwit/qwdata
    command: ["run"]
    volumes:
      - lmnr-quickwit-data:/quickwit/qwdata
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7280/health/livez"]
      interval: 10s
      timeout: 5s
      retries: 3

  lmnr-query-engine:
    image: ghcr.io/lmnr-ai/query-engine
    pull_policy: always
    ports:
      - "8903:8903"
    environment:
      PORT: 8903
    healthcheck:
      test: ["CMD", "sleep", "5"]
      interval: 10s
      timeout: 6s
      retries: 3

  lmnr-frontend:
    image: ghcr.io/lmnr-ai/frontend
    pull_policy: always
    ports:
      - "5667:5667"
    depends_on:
      lmnr-postgres:
        condition: service_healthy
      lmnr-quickwit:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres_passwordabc@lmnr-postgres:5432/postgres
      PORT: 5667
      BACKEND_URL: http://lmnr-app-server:8000
      BACKEND_RT_URL: http://lmnr-app-server:8002
      SHARED_SECRET_TOKEN: some_secret
      NEXTAUTH_URL: http://localhost:5667
      NEXTAUTH_SECRET: some_secret
      NEXT_PUBLIC_URL: http://localhost:5667
      ENVIRONMENT: LITE
      CLICKHOUSE_URL: http://lmnr-clickhouse:8123
      CLICKHOUSE_USER: ch_user
      CLICKHOUSE_PASSWORD: ch_passwd
      CLICKHOUSE_RO_USER: ch_user
      CLICKHOUSE_RO_PASSWORD: ch_passwd
      AEAD_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

  lmnr-app-server:
    image: ghcr.io/lmnr-ai/app-server
    pull_policy: always
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    depends_on:
      lmnr-postgres:
        condition: service_healthy
      lmnr-clickhouse:
        condition: service_started
      lmnr-quickwit:
        condition: service_healthy
    environment:
      PORT: 8000
      GRPC_PORT: 8001
      DATABASE_URL: postgres://postgres:postgres_passwordabc@lmnr-postgres:5432/postgres
      SHARED_SECRET_TOKEN: some_secret
      CLICKHOUSE_URL: http://lmnr-clickhouse:8123
      CLICKHOUSE_USER: ch_user
      CLICKHOUSE_PASSWORD: ch_passwd
      CLICKHOUSE_RO_USER: ch_user
      CLICKHOUSE_RO_PASSWORD: ch_passwd
      ENVIRONMENT: LITE
      AEAD_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      QUERY_ENGINE_URL: http://lmnr-query-engine:8903
      QUICKWIT_SEARCH_URL: http://lmnr-quickwit:7280
      QUICKWIT_INGEST_URL: http://lmnr-quickwit:7281
      QUICKWIT_SPANS_INDEX_ID: spans_v2

  # ── ARTHUR agent orchestrator ──────────────────────────────────────────
  agent-orchestrator:
    build: .
    container_name: arthur-orchestrator
    # Mount the local directory overrides the container's /app so generated code appears locally.
    volumes:
      - .:/app
      # Mount docker socket so OpenHands can spin up sandboxed containers natively on your host
      - /var/run/docker.sock:/var/run/docker.sock
      # Patch OpenHands SDK to pass LMNR_BASE_URL to Laminar.initialize()
      - ./patches/laminar.py:/opt/conda/envs/env_name/lib/python3.13/site-packages/openhands/sdk/observability/laminar.py:ro
    # Pass through the LLM API keys via .env file
    env_file:
      - .env
    # Configure OpenHands telemetry to use co-located Laminar backend
    environment:
      - LMNR_PROJECT_API_KEY=${LMNR_PROJECT_API_KEY}
      - LMNR_BASE_URL=http://lmnr-app-server:8001
    # Expose Streamlit dashboard port
    ports:
      - "8501:8501"
    depends_on:
      lmnr-app-server:
        condition: service_started
    # Optionally customize the command here, eg if you want to run aggregate_tests instead:
    # command: ["conda", "run", "--no-capture-output", "-n", "env_name", "python", "src/aggregate_tests.py"]

volumes:
  lmnr-postgres-data:
  lmnr-clickhouse-data:
  lmnr-clickhouse-logs:
  lmnr-quickwit-data:
